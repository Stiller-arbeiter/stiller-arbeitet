<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zugang - Der stille Arbeiter</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400&family=Newsreader:opsz,wght@6..72,300;6..72,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{--ground:#12100E;--raised:#1C1814;--read:#E8DFD2;--faded:#8A7B6B;--ember:#B8703F;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--ground);color:var(--read);font-family:'Newsreader',Georgia,serif;font-weight:300;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:6vh 7vw;line-height:1.8;}
  .card{max-width:480px;width:100%;}
  .eyebrow{font-family:'Fraunces',serif;text-transform:uppercase;letter-spacing:0.26em;font-size:0.7rem;color:var(--faded);margin-bottom:1.6rem;text-align:center;}
  h1{font-family:'Fraunces',serif;font-weight:300;font-size:1.8rem;margin-bottom:2rem;line-height:1.35;text-align:center;}
  label{display:block;font-size:0.85rem;color:var(--faded);margin-bottom:0.4rem;margin-top:1.1rem;}
  input, select{width:100%;background:var(--raised);border:1px solid rgba(138,123,107,0.25);border-radius:3px;color:var(--read);font-family:'Newsreader',Georgia,serif;font-size:1.02rem;font-weight:300;padding:0.85rem 1rem;}
  input:focus, select:focus{outline:none;border-color:rgba(184,112,63,0.6);}
  .row{display:flex;gap:12px;}
  .row > div{flex:1;}
  button{width:100%;margin-top:1.8rem;font-family:'Fraunces',serif;font-size:1rem;color:var(--read);background:transparent;border:1px solid rgba(184,112,63,0.5);border-radius:2px;padding:0.9rem;cursor:pointer;transition:all 0.35s ease;}
  button:hover:not(:disabled){border-color:var(--ember);background:rgba(184,112,63,0.08);}
  button:disabled{opacity:0.45;cursor:default;}
  #meldung{margin-top:1.5rem;font-size:0.95rem;text-align:center;min-height:1.5em;word-break:break-word;}
  .fehler{color:#e08050;font-weight:400;}
  .erfolg{color:var(--ember);}
</style>
</head>
<body>
  <div class="card">
    <div class="eyebrow">Zugang</div>
    <h1>Bevor die erste Tuer sich oeffnet</h1>
    <label for="vorname">Vorname</label>
    <input id="vorname" placeholder="Dein Vorname" />
    <label for="nachname">Nachname</label>
    <input id="nachname" placeholder="Dein Nachname" />
    <div class="row">
      <div>
        <label for="geburtstag">Geburtstag</label>
        <input id="geburtstag" type="date" />
      </div>
      <div>
        <label for="geschlecht">Geschlecht</label>
        <select id="geschlecht">
          <option value="">bitte waehlen</option>
          <option value="m">maennlich</option>
          <option value="w">weiblich</option>
          <option value="divers">divers / keine Angabe</option>
        </select>
      </div>
    </div>
    <label for="themenpfad">Welches Thema beschaeftigt dich gerade am meisten?</label>
    <select id="themenpfad">
      <option value="">bitte waehlen</option>
      <option value="geld">Geld</option>
      <option value="liebe">Liebe</option>
      <option value="gesundheit">Gesundheit</option>
      <option value="identitaet">Identitaet</option>
    </select>
    <label for="email">E-Mail</label>
    <input id="email" type="email" placeholder="deine@email.de" />
    <label for="passwort">Passwort</label>
    <input id="passwort" type="password" placeholder="Mindestens 6 Zeichen" />
    <button id="btn">Zugang anlegen</button>
    <div id="meldung">Bereit.</div>
  </div>
<script>
  var meldung = document.getElementById('meldung');
  var btn = document.getElementById('btn');

  var supabaseClient;
  try {
    var SUPABASE_URL = 'https://kkgpsjlchcfrkcfhbgtp.supabase.co';
    var SUPABASE_KEY = 'sb_publishable_L2hwq-MPg-2ZdCd6Dw2RUA_Hw_oT0vp';
    supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    meldung.textContent = 'Verbindung bereit. Formular ausfuellen und Knopf druecken.';
  } catch (err) {
    meldung.className = 'fehler';
    meldung.textContent = 'VERBINDUNGS-FEHLER: ' + (err && err.message ? err.message : String(err));
  }

  btn.addEventListener('click', function(){
    handleSignup();
  });

  async function handleSignup(){
    try {
      var vorname = document.getElementById('vorname').value.trim();
      var nachname = document.getElementById('nachname').value.trim();
      var geburtstag = document.getElementById('geburtstag').value;
      var geschlecht = document.getElementById('geschlecht').value;
      var themenpfad = document.getElementById('themenpfad').value;
      var email = document.getElementById('email').value.trim();
      var passwort = document.getElementById('passwort').value;

      if(!vorname || !email || !passwort){
        meldung.className = 'fehler';
        meldung.textContent = 'Vorname, E-Mail und Passwort sind Pflicht.';
        return;
      }
      if(passwort.length < 6){
        meldung.className = 'fehler';
        meldung.textContent = 'Das Passwort muss mindestens 6 Zeichen haben.';
        return;
      }

      btn.disabled = true;
      meldung.className = '';
      meldung.textContent = 'Dein Zugang wird angelegt...';

      var signUpResult = await supabaseClient.auth.signUp({ email: email, password: passwort });

      if(signUpResult.error){
        meldung.className = 'fehler';
        meldung.textContent = 'FEHLER BEI ANMELDUNG: ' + signUpResult.error.message;
        btn.disabled = false;
        return;
      }

      var userId = (signUpResult.data && signUpResult.data.user) ? signUpResult.data.user.id : null;

      if(!userId){
        meldung.className = 'fehler';
        meldung.textContent = 'Kein User-Objekt erhalten.';
        btn.disabled = false;
        return;
      }

      var profilResult = await supabaseClient.from('profile').insert({
        id: userId,
        vorname: vorname,
        nachname: nachname || null,
        geburtstag: geburtstag || null,
        geschlecht: geschlecht || null,
        themenpfad: themenpfad || null
      });

      if(profilResult.error){
        meldung.className = 'fehler';
        meldung.textContent = 'Konto angelegt, aber PROFIL-FEHLER: ' + profilResult.error.message;
        btn.disabled = false;
        return;
      }

      meldung.className = 'erfolg';
      meldung.textContent = 'Willkommen, ' + vorname + '. Dein Zugang steht. Pruef deine E-Mail zur Bestaetigung.';
      btn.disabled = false;

    } catch (err) {
      meldung.className = 'fehler';
      meldung.textContent = 'UNERWARTETER FEHLER: ' + (err && err.message ? err.message : String(err));
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
